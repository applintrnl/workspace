<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dev Console Map</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: radial-gradient(circle at 20% 20%, #1a1a1a, #050505);
  color: white;
  overflow: hidden;
}

.glass {
  backdrop-filter: blur(30px) saturate(180%);
  background: linear-gradient(rgba(255,255,255,0.08), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
  border-radius: 20px;
}

.container {
  display: flex;
  height: 100vh;
  gap: 15px;
  padding: 15px;
}

.sidebar {
  width: 340px;
  padding: 20px;
}

#map {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
}

/* UI */
.title { font-size: 22px; font-weight: 600; }
.subtitle { font-size: 13px; opacity: 0.6; margin-bottom: 10px; }

input {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  margin-bottom: 5px;
}

/* Autocomplete */
.suggestions {
  max-height: 120px;
  overflow-y: auto;
  margin-bottom: 10px;
}
.suggestion {
  padding: 6px;
  font-size: 12px;
  cursor: pointer;
}
.suggestion:hover { background: rgba(255,255,255,0.1); }

/* Buttons */
button {
  padding: 8px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #0a84ff, #4fa3ff);
  color: white;
  cursor: pointer;
  margin: 3px 0;
}

/* Category Buttons */
.categories button {
  width: auto;
  margin: 3px;
  padding: 6px 10px;
  font-size: 12px;
}

/* Results */
.poi {
  padding: 8px;
  border-radius: 10px;
  margin-top: 6px;
  background: rgba(255,255,255,0.05);
  font-size: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar glass">
    <div class="title">Dev Console</div>
    <div class="subtitle">POI Explorer + Heatmap</div>

    <input id="query" placeholder="Suche Ort oder POI..." oninput="autocomplete()" />
    <div id="suggestions" class="suggestions"></div>

    <!-- Kategorien -->
    <div class="categories">
      <button onclick="categorySearch('restaurant')">🍔 Food</button>
      <button onclick="categorySearch('cafe')">☕ Coffee</button>
      <button onclick="categorySearch('gym')">🏋️ Gym</button>
      <button onclick="categorySearch('hospital')">🏥 Health</button>
    </div>

    <button onclick="toggleHeatmap()">Toggle Heatmap</button>

    <div id="results"></div>
  </div>

  <div id="map" class="glass"></div>

</div>

<script>
const map = L.map('map').setView([53.0793, 8.8017], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markers = [];
let heatLayer = null;
let heatEnabled = false;

/* ===== Autocomplete ===== */
async function autocomplete() {
  const query = document.getElementById("query").value;
  if (query.length < 3) return;

  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5`;
  const res = await fetch(url);
  const data = await res.json();

  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  data.forEach(place => {
    const el = document.createElement("div");
    el.className = "suggestion";
    el.innerText = place.display_name;

    el.onclick = () => {
      map.setView([place.lat, place.lon], 14);
      box.innerHTML = "";
    };

    box.appendChild(el);
  });
}

/* ===== Category Search (Overpass API) ===== */
async function categorySearch(type) {
  const bbox = map.getBounds();
  const query = `
  [out:json];
  node["amenity"="${type}"](${bbox.getSouth()},${bbox.getWest()},${bbox.getNorth()},${bbox.getEast()});
  out;
  `;

  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  const data = await res.json();

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  const heatPoints = [];

  data.elements.forEach(el => {
    const lat = el.lat;
    const lon = el.lon;

    const marker = L.marker([lat, lon]).addTo(map);
    markers.push(marker);

    heatPoints.push([lat, lon, 0.5]);

    const name = el.tags?.name || type;

    const div = document.createElement("div");
    div.className = "poi";
    div.innerText = name;

    div.onclick = () => {
      map.setView([lat, lon], 17);
    };

    resultsDiv.appendChild(div);
  });

  if (heatEnabled) {
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(heatPoints, { radius: 25 }).addTo(map);
  }
}

/* ===== Heatmap Toggle ===== */
function toggleHeatmap() {
  heatEnabled = !heatEnabled;
  if (!heatEnabled && heatLayer) {
    map.removeLayer(heatLayer);
  }
}
</script>

</body>
</html>
