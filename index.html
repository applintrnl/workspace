<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dev Console KenRing</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 20% 20%, #1a1a1a, #050505);
  color: white;
  overflow: hidden;
}

.glass {
  backdrop-filter: blur(30px) saturate(180%);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

.container {
  display: flex;
  height: 100vh;
  gap: 15px;
  padding: 15px;
}

.sidebar {
  width: 340px;
  padding: 20px;
}

#map {
  flex: 1;
  border-radius: 20px;
}

input, button {
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

button {
  background: #0a84ff;
  color: white;
  cursor: pointer;
}

.poi {
  padding: 6px;
  margin-top: 5px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  cursor: pointer;
}

.suggestion {
  font-size: 12px;
  padding: 4px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="sidebar glass">
    <h3>Dev Console KenRing</h3>

    <input id="query" placeholder="Suche..." oninput="autocomplete()" />
    <div id="suggestions"></div>

    <button onclick="categorySearch('restaurant')">🍔 Food</button>
    <button onclick="categorySearch('cafe')">☕ Coffee</button>
    <button onclick="categorySearch('gym')">🏋️ Gym</button>
    <button onclick="categorySearch('hospital')">🏥 Health</button>

    <label>Radius</label>
    <input id="radius" type="range" min="50" max="1000" value="200"/>
    <div id="radiusValue">200 m</div>

    <button onclick="toggleHeatmap()">Heatmap</button>

    <input id="saveName" placeholder="Preset Name"/>
    <button onclick="saveState()">Speichern</button>
    <button onclick="loadState()">Laden</button>

    <div id="results"></div>
  </div>

  <div id="map"></div>

</div>

<script>
const map = L.map('map').setView([53.0793, 8.8017], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];
let circles = [];
let heatLayer = null;
let heatEnabled = false;
let currentCategory = null;

/* Autocomplete */
async function autocomplete() {
  const q = document.getElementById("query").value;
  if (q.length < 3) return;

  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=5`);
  const data = await res.json();

  const box = document.getElementById("suggestions");
  box.innerHTML = "";

  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "suggestion";
    el.innerText = p.display_name;

    el.onclick = () => {
      map.setView([p.lat, p.lon], 14);
      box.innerHTML = "";
    };

    box.appendChild(el);
  });
}

/* POI Suche */
async function categorySearch(type) {
  currentCategory = type;

  const bbox = map.getBounds();

  const query = `
  [out:json];
  node["amenity"="${type}"](${bbox.getSouth()},${bbox.getWest()},${bbox.getNorth()},${bbox.getEast()});
  out;
  `;

  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  });

  const data = await res.json();

  markers.forEach(m => map.removeLayer(m));
  circles.forEach(c => map.removeLayer(c));
  markers = [];
  circles = [];

  const results = document.getElementById("results");
  results.innerHTML = "";

  const radius = document.getElementById("radius").value;
  const heatPoints = [];

  data.elements.forEach(el => {
    const lat = el.lat;
    const lon = el.lon;

    const marker = L.marker([lat, lon]).addTo(map);
    markers.push(marker);

    const circle = L.circle([lat, lon], {
      radius: radius,
      color: "#0a84ff",
      fillOpacity: 0.1
    }).addTo(map);

    circles.push(circle);
    heatPoints.push([lat, lon, 0.5]);

    const name = el.tags?.name || type;

    const div = document.createElement("div");
    div.className = "poi";
    div.innerText = name;

    div.onclick = () => {
      map.setView([lat, lon], 17);
    };

    results.appendChild(div);
  });

  if (heatEnabled) {
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(heatPoints).addTo(map);
  }

  updateHash();
}

/* Radius */
document.getElementById("radius").oninput = function() {
  document.getElementById("radiusValue").innerText = this.value + " m";
  circles.forEach(c => c.setRadius(this.value));
  updateHash();
};

/* Heatmap */
function toggleHeatmap() {
  heatEnabled = !heatEnabled;
  if (!heatEnabled && heatLayer) map.removeLayer(heatLayer);
}

/* Hash speichern */
function updateHash() {
  const state = {
    lat: map.getCenter().lat,
    lng: map.getCenter().lng,
    zoom: map.getZoom(),
    radius: document.getElementById("radius").value,
    category: currentCategory
  };

  location.hash = btoa(JSON.stringify(state));
}

/* Hash laden */
function loadFromHash() {
  if (!location.hash) return;

  const state = JSON.parse(atob(location.hash.substring(1)));

  map.setView([state.lat, state.lng], state.zoom);
  document.getElementById("radius").value = state.radius;
  document.getElementById("radiusValue").innerText = state.radius + " m";

  if (state.category) categorySearch(state.category);
}

/* Presets */
function saveState() {
  const name = document.getElementById("saveName").value;
  if (!name) return;

  localStorage.setItem("map_" + name, location.hash);
  alert("Gespeichert");
}

function loadState() {
  const name = document.getElementById("saveName").value;
  if (!name) return;

  const state = localStorage.getItem("map_" + name);
  if (!state) return alert("Nicht gefunden");

  location.hash = state;
  loadFromHash();
}

/* Init */
loadFromHash();
</script>

</body>
</html>
